<!doctype html>
<html lang="en">
    <head>
        <title>Pd4Web</title>
        <meta charset="UTF-8" />
        <!-- WebApp manifest -->
        <link rel="manifest" href="manifest.json" />
        <meta name="theme-color" content="#000000" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="apple-touch-icon" href="icon-192.png" />
        <meta name="mobile-web-app-capable" content="yes" />
        <!-- Always BEFORE pd4web.js (it update COI) -->
        <script src="./pd4web.threads.js"></script>
        <!-- Main modules -->

        <script src="./pd4web.js"></script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap");

            :root {
                --bg: #f4f6f9;
                --fg: rgba(20, 25, 31, 0.92);
                --panel: rgba(255, 255, 255, 0.75);
                --shadow: rgba(15, 23, 42, 0.12) 0px 2px 4px, rgba(15, 23, 42, 0.22) 0px 10px 24px;
                --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
            }

            body {
                margin: 0;
                touch-action: pan-x pan-y;
                font-family: var(--font-sans);
            }

            span {
                color: var(--fg);
            }

            #wasm-loader {
                position: fixed;
                top: 1rem;
                left: 50%;
                transform: translateX(-50%);
                display: grid;
                gap: 0.35rem;
                text-align: center;
                width: min(320px, calc(100vw - 2rem));
                padding: 0.65rem 0.85rem;
                border-radius: 0.65rem;
            }

            #status {
                font-size: 0.72rem;
            }

            #progress {
                width: 100%;
                height: 0.45rem;
                border-radius: 999px;
                margin-top: 1%;
            }

            .pd4web-patch-canvas {
                margin: 10px auto;
                display: block;
                border-radius: 0.65rem;
                box-shadow: var(--shadow);
            }

            .pd4web-patch-canvas:focus {
                box-shadow:
                    rgba(100, 30, 37, 0.12) 0px 2px 4px 0px,
                    rgba(100, 30, 37, 0.32) 0px 2px 16px 0px;
                outline: none;
            }

            .pd4web-sound-switch {
                display: flex;
                justify-content: center;
                align-items: center;
                width: 25px;
                height: 25px;
                margin: 0 auto;
                transform: none;
            }

            @media (prefers-color-scheme: dark) {
                .pd4web-sound-switch {
                    filter: invert(1);
                }
            }

            .btn-obra {
                background: #111;
                color: white;

                border: none;
                border-radius: 14px;

                padding: 14px 28px;

                font-size: 15px;
                font-weight: 500;

                cursor: pointer;

                transition: 0.2s ease;
            }

            .btn-obra:hover {
                transform: translateY(-2px);
                background: #222;
            }

            #clock {
                color: black;
                padding: 20px 20px;
                border-radius: 14px;
                font-size: 15px;
                font-weight: 500;
                font-family: Inter, sans-serif;
                display: inline-block;
                box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
                transition:
                    transform 0.18s ease,
                    box-shadow 0.18s ease;
            }

            #clock:hover {
                transform: translateY(-2px);

                box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
            }

            .progress {
                width: 100%;
                height: 20px;
                background: #e0e0e0;
                border-radius: 10px;
                overflow: hidden;
            }

            .progress {
                position: relative;
                width: 90%;
                margin: auto;
                height: 20px;
                background: #e0e0e0;
                border-radius: 10px;
                overflow: hidden;
            }

            .progress-bar {
                height: 100%;
                background: black;
                transition: width 0.3s ease;
            }

            .progress-text {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 12px;
                color: white;
                pointer-events: none;
            }

            #vexscore {
                width: 90vw;
                height: 65vh; /* reserve space for clock / UI */
                display: block;
            }

            #needle {
                transform-origin: 50px 50px;
                transition: transform 0.08s linear;
                transform-origin: 100px 100px;
                transform-box: view-box;
            }

            #compass-rotating {
                transform-box: view-box;
                transform-origin: 100px 100px;
            }

            .academic-button {
                display: inline-flex;
                align-items: center;
                justify-content: center;

                height: 48px;
                padding: 0 1.5rem;

                background: transparent;
                color: #000000;

                border: 1px solid #000000;
                border-radius: 4px;

                font-size: 14px;
                font-weight: 500;
                letter-spacing: 0.02em;

                cursor: pointer;

                transition:
                    background-color 160ms ease,
                    color 160ms ease,
                    border-color 160ms ease;
            }

            .academic-button:hover {
                background: #000000;
                color: #ffffff;
            }

            .academic-button:focus-visible {
                outline: none;
                border-width: 2px;
            }

            .composer-label {
                margin-right: 10%;
                font-size: 10px;
                font-weight: 500;
                line-height: 1.4;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: #666666;
                text-align: right;
            }
        </style>
    </head>

    <body>
        <div id="title" style="margin-top: 1%; display: flex; justify-content: center">
            <h1 style="color: black">NIS v0.0.4</h1>
        </div>
        <p class="composer-label">Cassia Carrascoza</p>
        <p class="composer-label">Charles K. Neimog</p>
        <div style="display: flex; justify-content: center">
            <button id="pd4web-init" class="academic-button">Iniciar Obra</button>
        </div>

        <div style="display: flex; justify-content: center; margin-top: 20px">
            <svg
                style="border: 1px"
                id="compass"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 200 200"
                width="100"
                height="100"
            >
                <!-- STATIC RINGS -->
                <circle cx="100" cy="100" r="90" fill="none" stroke="#333" stroke-width="8" />

                <circle cx="100" cy="100" r="82" fill="none" stroke="#ddd" stroke-width="2" />

                <!-- EVERYTHING THAT ROTATES -->
                <g id="compass-rotating">
                    <!-- LETTERS -->

                    <text
                        x="100"
                        y="35"
                        font-family="sans-serif"
                        font-weight="bold"
                        font-size="20"
                        text-anchor="middle"
                        fill="#E53935"
                    >
                        N
                    </text>

                    <text
                        x="100"
                        y="180"
                        font-family="sans-serif"
                        font-weight="bold"
                        font-size="20"
                        text-anchor="middle"
                        fill="#1565C0"
                    >
                        S
                    </text>

                    <text
                        x="175"
                        y="107"
                        font-family="sans-serif"
                        font-weight="bold"
                        font-size="20"
                        text-anchor="middle"
                        fill="#43A047"
                    >
                        E
                    </text>

                    <text
                        x="25"
                        y="107"
                        font-family="sans-serif"
                        font-weight="bold"
                        font-size="20"
                        text-anchor="middle"
                        fill="#FDD835"
                    >
                        W
                    </text>

                    <!-- NEEDLE -->

                    <g id="needle">
                        <path d="M100 100 L85 100 L100 40 Z" fill="#E53935" />

                        <path d="M100 100 L115 100 L100 40 Z" fill="#C62828" />

                        <path d="M100 100 L85 100 L100 160 Z" fill="#1E88E5" />

                        <path d="M100 100 L115 100 L100 160 Z" fill="#1565C0" />
                    </g>
                </g>

                <!-- CENTER PIN -->
                <circle cx="100" cy="100" r="6" fill="#333" />
                <circle cx="100" cy="100" r="2" fill="#fff" />
            </svg>
        </div>

        <div
            id="vexscore"
            style="
                margin: auto;
                height: 40vh;
                border-radius: 5px;
                margin-top: 1%;
                margin-bottom: 1%;
                box-shadow:
                    0 10px 30px rgba(0, 0, 0, 0.32),
                    0 4px 8px rgba(0, 0, 0, 0.22);
            "
        ></div>
        <script>
            var Pd4Web = null;
            /* Init Pd4Web */
            (async () => {
                try {
                    Pd4WebModule().then((module) => {
                        Pd4Web = new module.Pd4Web();
                        Pd4Web.openPatch("index.pd");
                    });
                } catch (error) {
                    console.error(error);
                }
            })();
        </script>
        <script type="module" src="score.js"></script>
    </body>
</html>
