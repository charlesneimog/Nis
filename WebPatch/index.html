<!doctype html>
<html lang="en">
    <head>
        <title>Pd4Web</title>
        <meta charset="UTF-8" />
        <!-- WebApp manifest -->
        <link rel="manifest" href="manifest.json" />
        <meta name="theme-color" content="#000000" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="apple-touch-icon" href="icon-192.png" />
        <meta name="mobile-web-app-capable" content="yes" />
        <!-- Always BEFORE pd4web.js (it update COI) -->
        <script src="./pd4web.threads.js"></script>
        <!-- Main modules -->

        <script src="./pd4web.js"></script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap");

            :root {
                --bg: #f4f6f9;
                --fg: rgba(20, 25, 31, 0.92);
                --panel: rgba(255, 255, 255, 0.75);
                --shadow: rgba(15, 23, 42, 0.12) 0px 2px 4px, rgba(15, 23, 42, 0.22) 0px 10px 24px;
                --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
            }

            body {
                margin: 0;
                touch-action: pan-x pan-y;
                font-family: var(--font-sans);
            }

            span {
                color: var(--fg);
            }

            #wasm-loader {
                position: fixed;
                top: 1rem;
                left: 50%;
                transform: translateX(-50%);
                display: grid;
                gap: 0.35rem;
                text-align: center;
                width: min(320px, calc(100vw - 2rem));
                padding: 0.65rem 0.85rem;
                border-radius: 0.65rem;
            }

            #status {
                font-size: 0.72rem;
            }

            #progress {
                width: 100%;
                height: 0.45rem;
                border-radius: 999px;
                margin-top: 1%;
            }

            .pd4web-patch-canvas {
                margin: 10px auto;
                display: block;
                border-radius: 0.65rem;
                box-shadow: var(--shadow);
            }

            .pd4web-patch-canvas:focus {
                box-shadow:
                    rgba(100, 30, 37, 0.12) 0px 2px 4px 0px,
                    rgba(100, 30, 37, 0.32) 0px 2px 16px 0px;
                outline: none;
            }

            .pd4web-sound-switch {
                display: flex;
                justify-content: center;
                align-items: center;
                width: 25px;
                height: 25px;
                margin: 0 auto;
                transform: none;
            }

            @media (prefers-color-scheme: dark) {
                .pd4web-sound-switch {
                    filter: invert(1);
                }
            }

            .btn-obra {
                background: #111;
                color: white;

                border: none;
                border-radius: 14px;

                padding: 14px 28px;

                font-size: 15px;
                font-weight: 500;

                cursor: pointer;

                transition: 0.2s ease;
            }

            .btn-obra:hover {
                transform: translateY(-2px);
                background: #222;
            }

            #clock {
                color: black;
                padding: 20px 20px;
                border-radius: 14px;
                font-size: 15px;
                font-weight: 500;
                font-family: Inter, sans-serif;
                display: inline-block;
                box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
                transition:
                    transform 0.18s ease,
                    box-shadow 0.18s ease;
            }

            #clock:hover {
                transform: translateY(-2px);

                box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
            }

            .progress {
                width: 100%;
                height: 20px;
                background: #e0e0e0;
                border-radius: 10px;
                overflow: hidden;
            }

            .progress {
                position: relative;
                width: 90%;
                margin: auto;
                height: 20px;
                background: #e0e0e0;
                border-radius: 10px;
                overflow: hidden;
            }

            .progress-bar {
                height: 100%;
                background: black;
                transition: width 0.3s ease;
            }

            .progress-text {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 12px;
                color: white;
                pointer-events: none;
            }

            #vexscore {
                width: 90vw;
                height: 65vh; /* reserve space for clock / UI */
                display: block;
            }

            .academic-button {
                display: inline-flex;
                align-items: center;
                justify-content: center;

                height: 48px;
                padding: 0 1.5rem;

                background: transparent;
                color: #000000;

                border: 1px solid #000000;
                border-radius: 4px;

                font-size: 14px;
                font-weight: 500;
                letter-spacing: 0.02em;

                cursor: pointer;

                transition:
                    background-color 160ms ease,
                    color 160ms ease,
                    border-color 160ms ease;
            }

            .academic-button:hover {
                background: #000000;
                color: #ffffff;
            }

            .academic-button:focus-visible {
                outline: none;
                border-width: 2px;
            }

            .composer-label {
                margin-right: 10%;
                font-size: 10px;
                font-weight: 500;
                line-height: 1.4;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: #666666;
                text-align: right;
            }

 /* minimal wrapper — just enough to hold the compass */
        .compass-wrapper {
            position: relative;
            width: 10vw;
            height: 10vw;
            margin: auto;
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.3));
        }

        /* CRITICAL: rotating group positioned at exact center of 200x200 viewBox */
        #compass-rotating {
            position: absolute;
            left: 50%;
            top: 50%;
            transform-origin: center center;
            transform-box: fill-box;
            will-change: transform;
        }

        /* needle pivot at viewBox center (100,100) */
        #needle {
            transform-origin: 100px 100px;
            transform-box: view-box;
        }fi

        </style>
    </head>

    <body>
        <div id="title" style="margin-top: 1%; display: flex; justify-content: center">
            <h1 style="color: black">NIS</h1>
        </div>
        <p class="composer-label">Cassia Carrascoza</p>
        <p class="composer-label">Charles K. Neimog</p>
        <div style="display: flex; justify-content: center">
            <button id="pd4web-init" class="academic-button">Iniciar Obra</button>
        </div>

        <div class="compass-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
                <!-- STATIC RINGS (never rotate) -->
                <circle cx="100" cy="100" r="90" fill="none" stroke="#2c3e44" stroke-width="8"/>
                <circle cx="100" cy="100" r="82" fill="none" stroke="#5a7a84" stroke-width="2"/>

                <!-- ROTATING GROUP: always points north -->
                <g id="compass-rotating">
                    <!-- Cardinal letters -->
                    <text x="100" y="32" font-family="system-ui, sans-serif" font-weight="800" font-size="22" text-anchor="middle" fill="#FF5E5E">N</text>
                    <text x="100" y="182" font-family="system-ui, sans-serif" font-weight="700" font-size="20" text-anchor="middle" fill="#5A9EFF">S</text>
                    <text x="176" y="107" font-family="system-ui, sans-serif" font-weight="700" font-size="20" text-anchor="middle" fill="#6FCF97">E</text>
                    <text x="24" y="107" font-family="system-ui, sans-serif" font-weight="700" font-size="20" text-anchor="middle" fill="#FFD966">W</text>

                    <!-- Compass needle -->
                    <g id="needle">
                        <!-- North (red) -->
                        <path d="M100 100 L87 100 L100 36 Z" fill="#E34234" stroke="#A02020" stroke-width="1"/>
                        <path d="M100 100 L113 100 L100 36 Z" fill="#D32F2F" stroke="#A02020" stroke-width="1"/>
                        <!-- South (blue) -->
                        <path d="M100 100 L87 100 L100 164 Z" fill="#2A6F9C" stroke="#154e6e" stroke-width="1"/>
                        <path d="M100 100 L113 100 L100 164 Z" fill="#1E5A7D" stroke="#154e6e" stroke-width="1"/>
                        <!-- Center pivot -->
                        <circle cx="100" cy="100" r="5" fill="#111" stroke="#ccc" stroke-width="1"/>
                    </g>
                </g>

                <!-- STATIC center pin (always on top, not rotating) -->
                <circle cx="100" cy="100" r="7" fill="#1e2a32" stroke="#c0d0dd" stroke-width="1.5"/>
                <circle cx="100" cy="100" r="2.5" fill="#ecf5ff"/>
            </svg>
        </div>

        <div
            id="vexscore"
            style="
                margin: auto;
                height: 40vh;
                border-radius: 5px;
                margin-top: 1%;
                margin-bottom: 1%;
                box-shadow:
                    0 10px 30px rgba(0, 0, 0, 0.32),
                    0 4px 8px rgba(0, 0, 0, 0.22);
            "
        ></div>
        <script>
            var Pd4Web = null;
            /* Init Pd4Web */
            (async () => {
                try {
                    Pd4WebModule().then((module) => {
                        Pd4Web = new module.Pd4Web();
                        Pd4Web.openPatch("index.pd");
                    });
                } catch (error) {
                    console.error(error);
                }
            })();
        </script>
        <script type="module" src="score.js"></script>
    </body>
</html>
